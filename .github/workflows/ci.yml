name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — pytest + isolation smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest (excluding e2e)
        # FIXME: the following suites are temporarily ignored because of
        # pre-existing drift against main. Restore them once fixed:
        #   - tests/test_context_isolation.py  (prompt text + tool-name roundtrip drift)
        #   - tests/test_direct_executor.py    (eligibility rules changed)
        #   - tests/test_kg_e2e.py             (test fixtures don't create kg_* tables)
        #   - tests/test_mcp_tools_e2e.py      (requires a live backend on localhost)
        run: |
          pytest --ignore=tests/e2e \
                 --ignore=tests/test_context_isolation.py \
                 --ignore=tests/test_direct_executor.py \
                 --ignore=tests/test_kg_e2e.py \
                 --ignore=tests/test_mcp_tools_e2e.py \
                 -q

      - name: Project isolation smoke test
        run: python scripts/smoke_test_isolation.py

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
