<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- V lettermark -->
  <path d="M 120 140 L 256 370 L 392 140" 
        stroke="white" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" 
        fill="none" opacity="0.95"/>
  <!-- Sound wave lines (right side, subtle) -->
  <line x1="335" y1="235" x2="375" y2="235" stroke="url(#wave)" stroke-width="10" stroke-linecap="round"/>
  <line x1="345" y1="265" x2="385" y2="265" stroke="url(#wave)" stroke-width="10" stroke-linecap="round"/>
  <line x1="330" y1="205" x2="365" y2="205" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
