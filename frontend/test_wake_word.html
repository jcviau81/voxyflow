<!DOCTYPE html>
<html>
<head>
    <title>Wake Word Test</title>
</head>
<body>
    <h1>Wake Word Test Console</h1>
    <button id='startBtn'>Start Wake Word Detection</button>
    <button id='stopBtn' disabled>Stop</button>
    <div id='status'>Ready</div>
    <pre id='logs' style='background: #222; color: #0f0; padding: 10px; height: 400px; overflow-y: auto;'></pre>
    
    <script type='module'>
        // Import the service
        import { wakeWordService } from './src/services/WakeWordService.ts';
        
        const status = document.getElementById('status');
        const logs = document.getElementById('logs');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        // Override console.log to capture output
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const msg = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            logs.textContent += msg + '\n';
            logs.scrollTop = logs.scrollHeight;
        };
        
        startBtn.onclick = async () => {
            try {
                status.textContent = 'Starting...';
                startBtn.disabled = true;
                await wakeWordService.start();
                status.textContent = 'Listening for wake word...';
                stopBtn.disabled = false;
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
                startBtn.disabled = false;
            }
        };
        
        stopBtn.onclick = async () => {
            status.textContent = 'Stopping...';
            stopBtn.disabled = true;
            await wakeWordService.stop();
            status.textContent = 'Stopped';
            startBtn.disabled = false;
        };
        
        // Listen for wake word detection
        window.addEventListener('wakeword:detected', () => {
            status.textContent = '🎉 WAKE WORD DETECTED!';
            setTimeout(() => {
                status.textContent = 'Listening for wake word...';
            }, 2000);
        });
    </script>
</body>
</html>
